name: Create Pull Request

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Title for the Pull Request"
        required: false
      description:
        description: "Description for the Pull Request"
        required: false

permissions:
  pull-requests: write
  contents: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    env:
      BASE_BRANCH: develop
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Create Pull Request
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          if [ -z "${{ github.event.inputs.title }}" ]; then
            TITLE="Merge branch '${BRANCH_NAME}' into ${{ env.BASE_BRANCH }}"
          else
            TITLE="${{ github.event.inputs.title }}"
          fi

          # Create new PR
          PR_URL=$(gh pr create --base ${{ env.BASE_BRANCH }} --head "$BRANCH_NAME" \
            --title "$TITLE" \
            --body "${{ github.event.inputs.description }}")

          echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          echo "Pull Request created: $PR_URL"